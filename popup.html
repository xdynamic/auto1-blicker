<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <title>Auction Blicker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      padding: 18px;
      background:
        radial-gradient(circle at top, rgba(0, 209, 178, 0.18), transparent 45%),
        linear-gradient(180deg, #101820 0%, #152534 100%);
      color: #f4f7fb;
      font-family: -apple-system, 'Inter', system-ui, sans-serif;
    }

    .logo {
      font-size: 18px;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(90deg, #6df7c1, #f9d66b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 16px;
      font-size: 13px;
      color: rgba(244, 247, 251, 0.78);
      line-height: 1.6;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .status-copy {
      min-width: 0;
    }

    .status-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(244, 247, 251, 0.55);
    }

    .status-value {
      font-size: 18px;
      font-weight: 800;
      margin-top: 2px;
    }

    .status-value.enabled {
      color: #6df7c1;
    }

    .status-value.disabled {
      color: #ff9f7d;
    }

    .toggle {
      border: 0;
      border-radius: 999px;
      width: 72px;
      height: 38px;
      padding: 4px;
      position: relative;
      cursor: pointer;
      transition: background 0.18s ease, opacity 0.18s ease;
      background: rgba(255, 255, 255, 0.15);
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.28);
      transition: transform 0.18s ease;
    }

    .toggle.enabled {
      background: linear-gradient(90deg, #1fd28f, #58c1ff);
    }

    .toggle.enabled::after {
      transform: translateX(34px);
    }

    .toggle:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .hint {
      font-size: 13px;
      color: rgba(244, 247, 251, 0.72);
    }

    .version {
      font-size: 10px;
      color: rgba(244, 247, 251, 0.38);
      text-align: center;
      margin-top: 14px;
    }
  </style>
</head>

<body>
  <div class="logo">Otomoto Blicker</div>
  <div class="card">
    <div class="status-row">
      <div class="status-copy">
        <div class="status-label">Stan rozszerzenia</div>
        <div id="status-value" class="status-value">Aktywne</div>
      </div>
      <button id="toggle-extension" class="toggle enabled" type="button" aria-label="Przełącz rozszerzenie"></button>
    </div>
    <div id="status-hint" class="hint">
      Włączone na auto1.com. Po wyłączeniu panel i pobieranie danych zostaną zatrzymane.
    </div>
  </div>
  <div class="version">v3.0.0</div>
  <script src="popup.js"></script>
</body>

</html>
